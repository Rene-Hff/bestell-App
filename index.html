<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bestell app</title>

    <script src="script.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/fonts.css">

    
</head>
<body onload="init()">

<section class="header">
    <img class="header_logo" src="icons+imgs/Logo 02.svg">
    <img class="header_burger_menu" src="icons+imgs/dehaze.svg">
    
</section>
<section class="section_hero">
    <img class="hero" src="icons+imgs/hero.svg">
</section>
    <div class="content_restaurant_titlebox">
           <h1 class="h1_burger">Burger</h1><h1 class="h1_house">House</h1><span class="restaurant_rating">* 4,1 (317)</span>
    </div>
    <div class="title_of_restaurant">The best of Burgers, Pizza, and Greens, all in one great place.</div>
<section class="content_total"> <!-- content wrapper-->
    <div class="content_restaurant"> <!-- left side content-->
        
        <div id="content_category" class="content_restaurant_category"></div>
    </div>


    <div id="basket_stickyrail" class="basket_stickyrail">
        <div id="basket_standard" class="basket_content"></div>
        <div id="checkOutContainer"></div>
    </div>
    <dialog id="dialogMessage">Order confirmed! Your food is on the way!</dialog> 
</section>                  <!--content wrapper end-->


<section class="footer">
    <div class="copyright"><img  src="icons+imgs/copyright.svg">2026 BurgerHouse</div>
    <p>Imprint</p>
    <p>Cookie Preferences</p>
</section>
    
</body>
</html>
